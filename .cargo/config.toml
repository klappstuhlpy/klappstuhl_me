# Use the mold linker for Linux builds (the Docker image installs it). mold is a
# drop-in, much faster replacement for the default bfd/gold linker, which shaves
# a meaningful chunk off the final link step of a release build.
#
# Scoped to the Linux GNU target only, so local builds on other platforms
# (e.g. Windows MSVC) are unaffected and need no extra tooling.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# kls-core is fetched over public HTTPS, so libgit2 handles it and no SSH agent,
# credential helper, or `git-fetch-with-cli` escape hatch is needed. A clean
# checkout builds with nothing but a Rust toolchain.
