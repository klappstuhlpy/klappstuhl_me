# Use the mold linker for Linux builds (the Docker image installs it). mold is a
# drop-in, much faster replacement for the default bfd/gold linker, which shaves
# a meaningful chunk off the final link step of a release build.
#
# Scoped to the Linux GNU target only, so local builds on other platforms
# (e.g. Windows MSVC) are unaffected and need no extra tooling.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# Fetch git dependencies (the private klappstuhl_me-shared repo) with the git
# CLI rather than the built-in libgit2. The CLI honours the user's SSH agent and
# ~/.ssh config, so private-repo fetches over SSH work reliably (libgit2's SSH
# auth is flaky, especially on Windows). CI must have an SSH key with read
# access to klappstuhl_me-shared for this to resolve.
[net]
git-fetch-with-cli = true
