{% extends "../layout.html" %}

{% block nav_section %}{% include "percy/_brand_badge.html" %}{% endblock %}

{% block title %}{{ title }} | Percy | Klappstuhl.me{% endblock %}

{% block css %}
<link rel="stylesheet" href="/static/css/percy/dashboard.css" type="text/css"/>
<style>
.legal-doc {
    max-width: 820px;
    margin: 2.5rem auto 4rem;
    padding: 0 1.25rem;
}
.legal-doc-head {
    border-bottom: 1px solid var(--box-border);
    padding-bottom: 1rem;
    margin-bottom: 2rem;
}
.legal-doc-head .eyebrow {
    color: var(--branding);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}
.legal-doc-head h1 {
    margin: 0.35rem 0 0;
    font-size: 2rem;
    line-height: 1.2;
}
.legal-body {
    line-height: 1.75;
    /* `--text` is not a defined token, so this fell back to the hardcoded
       light-grey literal and was unreadable on the light background. */
    color: var(--foreground);
}
.legal-body h1,
.legal-body h2,
.legal-body h3 {
    line-height: 1.3;
    margin-top: 2.25rem;
    margin-bottom: 0.75rem;
}
.legal-body h1 { font-size: 1.6rem; }
.legal-body h2 {
    font-size: 1.3rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--box-border);
}
.legal-body h3 { font-size: 1.1rem; }
.legal-body p,
.legal-body ul,
.legal-body ol { margin: 0.75rem 0; }
.legal-body ul,
.legal-body ol { padding-left: 1.5rem; }
.legal-body li { margin: 0.35rem 0; }
.legal-body a {
    color: var(--branding);
    text-decoration: underline;
    text-underline-offset: 2px;
}
.legal-body a:hover { opacity: 0.85; }
.legal-body code {
    background: var(--box);
    border: 1px solid var(--box-border);
    border-radius: 4px;
    padding: 0.1rem 0.35rem;
    font-size: 0.9em;
}
.legal-body pre {
    background: var(--box);
    border: 1px solid var(--box-border);
    border-radius: 6px;
    padding: 1rem;
    overflow-x: auto;
}
.legal-body pre code { background: none; border: none; padding: 0; }
.legal-body blockquote {
    margin: 1rem 0;
    padding: 0.5rem 1rem;
    border-left: 3px solid var(--branding);
    color: var(--text-muted, #b0b0b0);
}
.legal-body table {
    border-collapse: collapse;
    width: 100%;
    margin: 1rem 0;
}
.legal-body th,
.legal-body td {
    border: 1px solid var(--box-border);
    padding: 0.5rem 0.75rem;
    text-align: left;
}
.legal-body hr {
    border: none;
    border-top: 3px solid var(--box-border);
    margin: 2rem 0;
}
</style>
{% endblock %}

{% block body %}
<article class="legal-doc">
    <header class="legal-doc-head">
        <span class="eyebrow">Percy</span>
        <h1>{{ title }}</h1>
    </header>
    <div class="legal-body">
        {{ content|safe }}
    </div>
</article>
{% endblock %}
