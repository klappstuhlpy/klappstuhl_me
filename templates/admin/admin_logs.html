{% extends "admin/admin_layout.html" %}

{% block title %}Logs | Admin | Klappstuhl.me{% endblock %}

{% block admin_css %}
<style>
    .log-controls { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    .log-controls select, .log-controls input { padding: 0.4rem 0.6rem; background: var(--box-shade); color: inherit; border: 1px solid var(--box-border); border-radius: 8px; }
    .log-controls input[type=text] { flex: 1 1 220px; }
    .log-view { background: #0b0b0d; border: 1px solid var(--box-border); border-radius: 10px; padding: 0.5rem; max-height: 70vh; overflow: auto; font-family: ui-monospace, monospace; font-size: 12.5px; }
    .log-row { display: flex; gap: 0.6rem; padding: 0.15rem 0.3rem; border-bottom: 1px solid #161619; white-space: pre-wrap; word-break: break-word; }
    .log-row:hover { background: #141417; }
    .log-ts { color: var(--text-muted); flex: 0 0 auto; }
    .log-lvl { flex: 0 0 52px; font-weight: 700; }
    .log-lvl.ERROR { color: var(--error-text); }
    .log-lvl.WARN  { color: var(--warning-text); }
    .log-lvl.INFO  { color: var(--success-text); }
    .log-lvl.DEBUG, .log-lvl.TRACE { color: var(--text-muted); }
    .log-msg { flex: 1 1 auto; }
    .log-empty { color: var(--text-muted); padding: 1rem; text-align: center; }
</style>
{% endblock %}

{% block admin_body %}
<div class="admin-page-header">
    <h1>Logs</h1>
    <p class="admin-page-sub">Tail and filter the rolling application and bad-request logs.</p>
</div>

<div class="log-controls">
    <select id="log-file">
        <option value="main">Application</option>
        <option value="bad">Bad requests</option>
    </select>
    <select id="log-level">
        <option value="">All levels</option>
        <option value="ERROR">Error</option>
        <option value="WARN">Warn</option>
        <option value="INFO">Info</option>
        <option value="DEBUG">Debug</option>
    </select>
    <input type="text" id="log-q" placeholder="Filter text…" autocomplete="off">
    <select id="log-limit">
        <option value="200">200 lines</option>
        <option value="500" selected>500 lines</option>
        <option value="1000">1000 lines</option>
    </select>
    <button class="button outline" id="log-refresh">Refresh</button>
    <label class="muted"><input type="checkbox" id="log-auto"> Auto</label>
</div>

<div class="log-view" id="log-view"><div class="log-empty">Loading…</div></div>

<script>
    const view = document.getElementById('log-view');
    const fileSel = document.getElementById('log-file');
    const levelSel = document.getElementById('log-level');
    const qInput = document.getElementById('log-q');
    const limitSel = document.getElementById('log-limit');
    const auto = document.getElementById('log-auto');
    let timer = null;

    function esc(s) {
        return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    async function load() {
        const params = new URLSearchParams({
            file: fileSel.value,
            level: levelSel.value,
            q: qInput.value,
            limit: limitSel.value,
        });
        try {
            const r = await fetch(`/admin/logs/data?${params}`);
            const data = await r.json();
            if (!data.lines || !data.lines.length) {
                view.innerHTML = '<div class="log-empty">No matching log lines.</div>';
                return;
            }
            view.innerHTML = data.lines.map(l => {
                const ts = esc((l.ts || '').replace('T', ' ').replace(/\.\d+Z?$/, ''));
                const lvl = esc(l.level || '');
                const msg = esc(l.message || l.raw || '');
                const tgt = l.target ? `<span class="log-ts">${esc(l.target)}</span>` : '';
                return `<div class="log-row"><span class="log-ts">${ts}</span>` +
                    `<span class="log-lvl ${lvl}">${lvl}</span>` +
                    `<span class="log-msg">${msg} ${tgt}</span></div>`;
            }).join('');
            view.scrollTop = view.scrollHeight;
        } catch (_) {
            view.innerHTML = '<div class="log-empty">Failed to load logs.</div>';
        }
    }

    document.getElementById('log-refresh').addEventListener('click', load);
    [fileSel, levelSel, limitSel].forEach(el => el.addEventListener('change', load));
    let debounce;
    qInput.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(load, 250); });
    auto.addEventListener('change', () => {
        if (auto.checked) timer = setInterval(load, 5000);
        else clearInterval(timer);
    });
    load();
</script>
{% endblock %}
