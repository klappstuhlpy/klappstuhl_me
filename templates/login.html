{% extends "layout.html" %}

{% block css %}
<link rel="stylesheet" href="/static/auth.css" type="text/css"/>
{% endblock %}

{% block title %}Login | Klappstuhl.me{% endblock %}

{% block body_end %}
<script src="/static/auth.js"></script>
{% endblock %}

{% block body %}
<div class="login-container">
    <div class="login-header">Welcome back</div>
    <form id="login-form" method="POST" action="/account/authenticate">
        {% for flash in flashes %}
        {{ flash.html()|safe }}
        {% endfor %}
        <label for="username">Username</label>
        <input class="form-field" required placeholder=" " pattern="[a-z0-9._\-]{0,32}" name="username" id="username" type="text" autocomplete="username">
        <label for="password">Password</label>
        <div class="password-container form-field">
            <input class="form-field" required placeholder=" " minlength="8" maxlength="128" name="password" id="password" type="password" autocomplete="current-password">
            <span class="password-icon"><img alt="" src="/static/img/visibility.svg" width="24px" height="24px"/></span>
        </div>
        <input type="hidden" id="session-description" name="session_description" value="">
        <div class="form-field button-container">
            <button class="button primary" tabindex="0">Login</button>
        </div>
    </form>
</div>
{% endblock %}
